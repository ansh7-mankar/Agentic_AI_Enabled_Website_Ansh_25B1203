<!DOCTYPE html>
<html>

<head>
    <title>Transaction History</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="add-transaction.html">Add Transaction</a>
        <a href="history.html">History</a>
        <a href="reports.html">Reports</a>
        <a href="assistant.html">AI Assistant</a>
        <a href="settings.html">Settings</a>
    </nav>

    <div class="container">

        <div class="card">

            <h1>Transaction History</h1>

            <table>

                <tr>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Type</th>
                    <th>Category</th>
                    <th>Date</th>
                    <th>Delete</th>
                </tr>

                <tbody id="historyTable">

                </tbody>

            </table>

        </div>

    </div>

    <script src="js/storage.js"></script>

    <script>

        function loadTransactions(){

            let transactions = getTransactions();

            let table = document.getElementById("historyTable");

            table.innerHTML = "";

            for(let i = 0; i < transactions.length; i++){

                let row = table.insertRow();

                row.insertCell(0).innerHTML = transactions[i].description;

                row.insertCell(1).innerHTML = "₹" + transactions[i].amount;

                row.insertCell(2).innerHTML = transactions[i].type;

                row.insertCell(3).innerHTML = transactions[i].category;

                row.insertCell(4).innerHTML = transactions[i].date;

                row.insertCell(5).innerHTML =
                "<button onclick='removeTransaction(" +
                transactions[i].id +
                ")'>Delete</button>";

            }

        }

        function removeTransaction(id){

            deleteTransaction(id);

            loadTransactions();

        }

        loadTransactions();

    </script>

</body>

</html>
